<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronome</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
    }
    .bpm-display {
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }
    .bpm-slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .bpm-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 20px;
      background: #333;
      border-radius: 10px;
      outline: none;
    }
    .bpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    .bpm-slider::-moz-range-thumb {
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    .bpm-btn {
      width: 48px;
      height: 48px;
      font-size: 1.5em;
      font-weight: bold;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bpm-btn:active {
      background: #444;
    }
    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }
    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-label {
      color: #888;
    }
    select {
      padding: 10px 14px;
      font-size: 1em;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
    }
    .control-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .control-label {
      color: #aaa;
      min-width: 80px;
    }
    .control-input {
      width: 50px;
      padding: 8px 4px;
      font-size: 1em;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      text-align: center;
    }
    .control-unit {
      color: #666;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: #fff;
      cursor: pointer;
    }
    .checkbox-label {
      color: #ddd;
      cursor: pointer;
    }
    .auto-increment-options {
      display: none;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    .auto-increment-options.visible {
      display: block;
    }
    .start-btn {
      width: 100%;
      padding: 20px;
      font-size: 1.5em;
      font-weight: bold;
      background: #2a2;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .start-btn:hover {
      background: #3b3;
    }
    .start-btn.running {
      background: #c33;
    }
    .start-btn.running:hover {
      background: #d44;
    }
    .beat-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
      padding: 15px 20px;
      cursor: pointer;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
    }
    .beat-indicator:active {
      background: rgba(255,255,255,0.05);
    }
    .beat-dot {
      width: 20px;
      height: 20px;
      background: #333;
      border-radius: 50%;
      transition: background 0.05s;
      pointer-events: none;
    }
    .beat-dot.active {
      background: #fff;
    }
    .beat-dot.accent {
      box-shadow: 0 0 6px rgba(255,180,0,0.5);
      border: 2px solid #fb0;
    }
    .stats {
      text-align: center;
      color: #666;
      font-size: 0.9em;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bpm-display" id="bpmDisplay">100</div>

    <div class="bpm-slider-container">
      <button class="bpm-btn" id="bpmMinus">&minus;</button>
      <input type="range" class="bpm-slider" id="bpmSlider" min="20" max="300" value="100">
      <button class="bpm-btn" id="bpmPlus">+</button>
    </div>

    <div class="settings-row">
      <div class="setting-group">
        <span class="setting-label">Time</span>
        <select id="timeSignature">
          <option value="2">2/4</option>
          <option value="3">3/4</option>
          <option value="4" selected>4/4</option>
          <option value="5">5/4</option>
          <option value="6">6/8</option>
          <option value="7">7/8</option>
        </select>
      </div>
      <div class="setting-group">
        <span class="setting-label">Sound</span>
        <select id="soundType">
          <option value="click" selected>Click</option>
          <option value="beep">Beep</option>
          <option value="woodblock">Wood Block</option>
          <option value="cowbell">Cowbell</option>
        </select>
      </div>
    </div>

    <div class="beat-indicator" id="beatIndicator">
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="autoIncrementEnabled">
      <label class="checkbox-label" for="autoIncrementEnabled">Auto tempo increase</label>
    </div>

    <div class="auto-increment-options" id="autoIncrementOptions">
      <div class="control-row">
        <span class="control-label">Increment by</span>
        <input type="number" class="control-input" id="incrementAmount" min="1" max="50" value="1">
        <span class="control-unit">BPM</span>
      </div>
      <div class="control-row">
        <span class="control-label">Every</span>
        <input type="number" class="control-input" id="incrementInterval" min="1" max="999" value="3">
        <select id="incrementMode">
          <option value="seconds" selected>seconds</option>
          <option value="beats">beats</option>
        </select>
      </div>
    </div>

    <button class="start-btn" id="startBtn">START</button>

    <div class="stats" id="stats"></div>
  </div>

  <script>
    // Audio context and sounds
    let audioCtx = null;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // Sound generators (time parameter enables sample-accurate scheduling)
    function playBeep(accent = false, time) {
      const t = time || audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = accent ? 1000 : 800;
      osc.type = 'sine';
      gain.gain.setValueAtTime(accent ? 0.3 : 0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t);
      osc.stop(t + 0.1);
    }

    function playClick(accent = false, time) {
      const t = time || audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.value = accent ? 2500 : 2000;
      filter.type = 'highpass';
      filter.frequency.value = 1000;
      gain.gain.setValueAtTime(accent ? 0.15 : 0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
      osc.start(t);
      osc.stop(t + 0.02);
    }

    function playWoodblock(accent = false, time) {
      const t = time || audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      const baseFreq = accent ? 800 : 600;
      osc.frequency.setValueAtTime(baseFreq, t);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.1);
      filter.type = 'bandpass';
      filter.frequency.value = baseFreq;
      filter.Q.value = 10;
      gain.gain.setValueAtTime(accent ? 0.4 : 0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t);
      osc.stop(t + 0.1);
    }

    function playCowbell(accent = false, time) {
      const t = time || audioCtx.currentTime;
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc1.type = 'square';
      osc2.type = 'square';
      const baseFreq = accent ? 800 : 560;
      osc1.frequency.value = baseFreq;
      osc2.frequency.value = baseFreq * 1.5;
      filter.type = 'bandpass';
      filter.frequency.value = baseFreq * 1.2;
      filter.Q.value = 3;
      gain.gain.setValueAtTime(accent ? 0.2 : 0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc1.start(t);
      osc2.start(t);
      osc1.stop(t + 0.3);
      osc2.stop(t + 0.3);
    }

    function playSound(accent = false, time) {
      if (!audioCtx) return;
      const soundType = document.getElementById('soundType').value;
      switch (soundType) {
        case 'beep': playBeep(accent, time); break;
        case 'click': playClick(accent, time); break;
        case 'woodblock': playWoodblock(accent, time); break;
        case 'cowbell': playCowbell(accent, time); break;
      }
    }

    // State
    let isRunning = false;
    let currentBpm = 100;
    let beatCount = 0;
    let startTime = 0;
    let nextBeatTime = 0;
    let timerInterval = null;
    let lastIncrementBeat = 0;
    let lastIncrementTime = 0;

    // DOM elements
    const bpmDisplay = document.getElementById('bpmDisplay');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmMinus = document.getElementById('bpmMinus');
    const bpmPlus = document.getElementById('bpmPlus');
    const startBtn = document.getElementById('startBtn');
    const beatIndicator = document.getElementById('beatIndicator');
    const stats = document.getElementById('stats');
    const timeSignature = document.getElementById('timeSignature');
    
    const autoIncrementEnabled = document.getElementById('autoIncrementEnabled');
    const autoIncrementOptions = document.getElementById('autoIncrementOptions');
    const incrementAmount = document.getElementById('incrementAmount');
    const incrementInterval = document.getElementById('incrementInterval');
    const incrementMode = document.getElementById('incrementMode');

    // Fit BPM text to fill container width without overflowing viewport height
    function fitBpmText() {
      const container = bpmDisplay.parentElement;
      const containerWidth = container.clientWidth;
      const viewportHeight = window.innerHeight;

      // Binary search for the largest font size that fits width
      const MIN_SIZE = 48;
      let lo = MIN_SIZE, hi = 500;
      while (hi - lo > 1) {
        const mid = (lo + hi) >> 1;
        bpmDisplay.style.fontSize = mid + 'px';
        if (bpmDisplay.scrollWidth <= containerWidth) {
          lo = mid;
        } else {
          hi = mid;
        }
      }
      bpmDisplay.style.fontSize = lo + 'px';

      // Now shrink if the page overflows the viewport vertically
      while (document.documentElement.scrollHeight > viewportHeight && lo > MIN_SIZE) {
        lo -= 2;
        bpmDisplay.style.fontSize = lo + 'px';
      }
    }
    window.addEventListener('resize', fitBpmText);

    // BPM control
    function setBpm(bpm, updateInputs = true) {
      bpm = Math.max(20, Math.min(300, Math.round(bpm)));
      currentBpm = bpm;
      bpmDisplay.textContent = bpm;
      fitBpmText();
      if (updateInputs) {
        bpmSlider.value = bpm;
      }
    }

    bpmSlider.addEventListener('input', () => {
      setBpm(parseInt(bpmSlider.value), false);
    });

    bpmMinus.addEventListener('click', () => {
      setBpm(currentBpm - 1);
      savePrefs();
    });
    bpmPlus.addEventListener('click', () => {
      setBpm(currentBpm + 1);
      savePrefs();
    });

    // Auto increment toggle
    autoIncrementEnabled.addEventListener('change', () => {
      autoIncrementOptions.classList.toggle('visible', autoIncrementEnabled.checked);
      fitBpmText();
    });

    // Time signature - update beat indicator
    function updateBeatDots() {
      const beats = parseInt(timeSignature.value);
      beatIndicator.innerHTML = '';
      for (let i = 0; i < beats; i++) {
        const dot = document.createElement('div');
        dot.className = 'beat-dot';
        if (i === 0) dot.classList.add('accent');
        beatIndicator.appendChild(dot);
      }
      downbeatOffset = 0;
    }

    timeSignature.addEventListener('change', updateBeatDots);

    // Track which beat is the downbeat (beat 0 = accent)
    let downbeatOffset = 0;

    // Beat indicator
    function updateBeatIndicator(beat) {
      const beats = parseInt(timeSignature.value);
      const dots = beatIndicator.querySelectorAll('.beat-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === beat % beats);
        dot.classList.toggle('accent', i === downbeatOffset % beats);
      });
    }

    // Beat indicator — tap tempo
    // Tapping the dots works as tap tempo: calculates BPM from tap intervals
    let tapTimes = [];
    let tapResetTimeout = null;
    let lastTapTime = 0;

    beatIndicator.addEventListener('mousedown', (e) => {
      e.preventDefault();
      handleTapTempo();
    });
    beatIndicator.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleTapTempo();
    });

    function handleTapTempo() {
      const now = performance.now();
      lastTapTime = now;

      // Reset if last tap was more than 3 seconds ago
      if (tapTimes.length > 0 && (now - tapTimes[tapTimes.length - 1]) > 3000) {
        tapTimes = [];
      }

      tapTimes.push(now);
      if (tapTimes.length > 16) tapTimes.shift();

      // Play an accented click on each tap
      initAudio();
      playSound(true);
      updateBeatIndicator(0);

      if (tapTimes.length >= 2) {
        let totalInterval = 0;
        for (let i = 1; i < tapTimes.length; i++) {
          totalInterval += tapTimes[i] - tapTimes[i - 1];
        }
        const avgInterval = totalInterval / (tapTimes.length - 1);
        const tappedBpm = Math.round(60000 / avgInterval);

        if (tappedBpm >= 20 && tappedBpm <= 300) {
          setBpm(tappedBpm);

          // Align phase: each tap is beat 1, next tick plays beat 2
          const beatDuration = 60000 / tappedBpm;
          nextBeatTime = now + beatDuration;
          beatCount = 1;

          // If metronome isn't running, start the timer
          if (!isRunning) {
            isRunning = true;
            startTime = now;
            lastIncrementBeat = 0;
            lastIncrementTime = now;
            startBtn.textContent = 'STOP';
            startBtn.classList.add('running');
            enableWakeLock();
            timerInterval = setInterval(tick, 10);
          }

          savePrefs();
        }
      }

      if (tapResetTimeout) clearTimeout(tapResetTimeout);
      tapResetTimeout = setTimeout(() => { tapTimes = []; }, 5000);
    }

    // Metronome logic
    function tick() {
      const now = performance.now();
      const beats = parseInt(timeSignature.value);
      
      while (nextBeatTime <= now) {
        const beatInMeasure = beatCount % beats;

        // If we're still within one beat interval of a tap, don't play — the tap already clicked.
        const beatDurationMs = 60000 / currentBpm;
        const timeSinceLastTap = now - lastTapTime;
        const tappingActive = lastTapTime > 0 && timeSinceLastTap < beatDurationMs * 1.1;

        if (!tappingActive) {
          playSound(beatInMeasure === 0);
          updateBeatIndicator(beatInMeasure);
        }
        
        beatCount++;
        
        // Check for auto increment
        if (autoIncrementEnabled.checked && currentBpm < 300) {
          const increment = parseInt(incrementAmount.value) || 5;
          const interval = parseInt(incrementInterval.value) || 10;
          const mode = incrementMode.value;
          
          let shouldIncrement = false;
          
          if (mode === 'beats') {
            if (beatCount - lastIncrementBeat >= interval) {
              shouldIncrement = true;
              lastIncrementBeat = beatCount;
            }
          } else {
            const elapsedSeconds = (now - lastIncrementTime) / 1000;
            if (elapsedSeconds >= interval) {
              shouldIncrement = true;
              lastIncrementTime = now;
            }
          }
          
          if (shouldIncrement) {
            setBpm(Math.min(currentBpm + increment, 300));
            savePrefs();
          }
        }
        
        // Calculate next beat time
        const beatDuration = 60000 / currentBpm;
        nextBeatTime += beatDuration;
      }
      
      // Update stats
      const elapsed = (now - startTime) / 1000;
      const mins = Math.floor(elapsed / 60);
      const secs = Math.floor(elapsed % 60);
      stats.textContent = `Beat ${beatCount} | ${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function start() {
      initAudio();
      
      isRunning = true;
      beatCount = 0;
      startTime = performance.now();
      nextBeatTime = startTime;
      lastIncrementBeat = 0;
      lastIncrementTime = startTime;
      
      startBtn.textContent = 'STOP';
      startBtn.classList.add('running');
      enableWakeLock();
      
      tick(); // First beat immediately
      timerInterval = setInterval(tick, 10);
    }

    function stop() {
      isRunning = false;
      
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      
      startBtn.textContent = 'START';
      startBtn.classList.remove('running');
      disableWakeLock();
      
      // Reset beat indicator
      const dots = beatIndicator.querySelectorAll('.beat-dot');
      dots.forEach(dot => dot.classList.remove('active'));
      
      stats.textContent = '';
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) {
        stop();
      } else {
        start();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
        e.preventDefault();
        startBtn.click();
      }
    });

    // Wake Lock: prevent device from sleeping while metronome is running
    // Uses Wake Lock API where available, with silent-video fallback for iOS Safari
    let wakeLock = null;
    let noSleepVideo = null;

    function createNoSleepVideo() {
      // Tiny silent MP4 video — tricks the browser into thinking media is playing
      const video = document.createElement('video');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.setAttribute('muted', '');
      video.style.position = 'fixed';
      video.style.top = '-1px';
      video.style.left = '-1px';
      video.style.width = '1px';
      video.style.height = '1px';
      video.style.opacity = '0.01';
      // Smallest valid silent MP4 (base64)
      video.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAhtZGF0AAAA1m1vb3YAAABsbXZoZAAAAAAAAAAAAAAAAAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidWR0YQAAAFptZXRhAAAAAAAAACFoZGxyAAAAAAAAAABtZGlyYXBwbAAAAAAAAAAAAAAAAC1pbHN0AAAAJal0b28AAAAdZGF0YQAAAAEAAAAATGF2ZjYwLjMuMTAw';
      video.loop = true;
      return video;
    }

    async function enableWakeLock() {
      // Try Wake Lock API first (Chrome, Edge, etc.)
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            console.log('Wake Lock released');
          });
          console.log('Wake Lock acquired');
          return;
        }
      } catch (err) {
        console.log('Wake Lock API error:', err.message);
      }
      // Fallback: silent video trick (iOS Safari and others)
      try {
        if (!noSleepVideo) {
          noSleepVideo = createNoSleepVideo();
          document.body.appendChild(noSleepVideo);
        }
        await noSleepVideo.play();
        console.log('NoSleep video playing');
      } catch (err) {
        console.log('NoSleep video error:', err.message);
      }
    }

    function disableWakeLock() {
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
      if (noSleepVideo) {
        noSleepVideo.pause();
      }
    }

    // Re-acquire wake lock when returning to page (OS releases it on tab switch)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && isRunning) {
        enableWakeLock();
      }
    });

    // LocalStorage persistence
    const STORAGE_KEY = 'metronome_prefs';
    
    function savePrefs() {
      const prefs = {
        bpm: currentBpm,
        timeSignature: timeSignature.value,
        soundType: document.getElementById('soundType').value,
        autoIncrement: autoIncrementEnabled.checked,
        incrementAmount: incrementAmount.value,
        incrementInterval: incrementInterval.value,
        incrementMode: incrementMode.value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs));
    }
    
    function loadPrefs() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const prefs = JSON.parse(stored);
          if (prefs.bpm) setBpm(prefs.bpm);
          if (prefs.timeSignature) timeSignature.value = prefs.timeSignature;
          if (prefs.soundType) document.getElementById('soundType').value = prefs.soundType;
          if (prefs.autoIncrement !== undefined) {
            autoIncrementEnabled.checked = prefs.autoIncrement;
            autoIncrementOptions.classList.toggle('visible', prefs.autoIncrement);
          }
          if (prefs.incrementAmount) incrementAmount.value = prefs.incrementAmount;
          if (prefs.incrementInterval) incrementInterval.value = prefs.incrementInterval;
          if (prefs.incrementMode) incrementMode.value = prefs.incrementMode;
        }
      } catch (e) {
        console.log('Could not load preferences:', e);
      }
    }
    
    // Add change listeners to save preferences
    bpmSlider.addEventListener('change', savePrefs);
    timeSignature.addEventListener('change', savePrefs);
    document.getElementById('soundType').addEventListener('change', savePrefs);
    autoIncrementEnabled.addEventListener('change', savePrefs);
    incrementAmount.addEventListener('change', savePrefs);
    incrementInterval.addEventListener('change', savePrefs);
    incrementMode.addEventListener('change', savePrefs);

    // Initialize
    loadPrefs();
    fitBpmText();
    updateBeatDots();
  </script>
</body>
</html>
